<!DOCTYPE html>
<html lang="en_US">
    <head>
        <meta charset="UTF-8">
        <!-- title and description -->
        <title>Астрономия бай</title>
        <meta name="description" content="Description content.">
        <!-- viewport -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
        <!-- styles -->
        <link rel="stylesheet" href="./styles/main.css" type="text/css">
        <link rel="stylesheet" href="./styles/slider.css" type="text/css">
        <!-- icons -->
        <link rel="icon" href="favicon.png"> <!--32х32-->
        <link rel="apple-touch-icon" href="./icons/touch-icon-iphone.png"> <!--60х60-->
        <link rel="apple-touch-icon" sizes="76x76" href="./icons/touch-icon-ipad.png">
        <link rel="apple-touch-icon" sizes="120x120" href="./icons/touch-icon-iphone-retina.png">
        <link rel="apple-touch-icon" sizes="152x152" href="./icons/touch-icon-ipad-retina.png">

        <meta property="og:title" content="Open graph title" />
        <meta property="og:type" content="article" /> <!-- if not audio and not video -->
        <meta property="og:url" content="https://website.com/" />
        <meta property="og:image" content="./icons/og.png" /> <!-- OG image is 1200×630 pixels  -->
        <meta property="og:site_name" content="website.com" /> <!-- not important -->
        <meta property="og:description" content="Description content." /> <!-- not important -->
        <meta property="og:locale" content="en_US" /> <!-- default: "en_US" -->
        <!-- JS -->
        <script defer src="./js/slider.js"></script>
        <script defer src="./js/scroll.js"></script>
        <script defer src="./js/timer.js"></script>

    <body>
        <header id="header">
            <img class="logo" src="./images/logo_600x600px.png" width="120">
            <h1>Отпуск на планетах</h1>
        </header>
        
        <div class="slider">
            <img src="./images/plyton.png" alt="Slide 1">
            <img src="./images/mars.png" alt="Slide 2">
            <img src="./images/upiter.png" alt="Slide 3">
            <img src="./images/saturn.png" alt="Slide 4">
            <img src="./images/zemlya.png" alt="Slide 5">
        </div>

        <nav>
            <a href="#header">В начало</a>
            <a href="#about">О нас</a>
            <a href="#products">О нас</a>
        </nav>

        <section id="about">

        </section>
        <section id="products"></section>

        </section>
        <div id="sale-container">
            <p class="sale-timer">
                <span id="hours">00</span> :
                <span id="minutes">00</span> :
                <span id="seconds">00</span>
            </p>
            <p class="sale-title">Скидка 25%</p>
        </div>
    </body>
</html>
